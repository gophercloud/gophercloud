name: functional-objectstorage
on:
  pull_request:
    paths:
      - 'openstack/auth_env.go'
      - 'openstack/client.go'
      - 'openstack/endpoint.go'
      - 'openstack/endpoint_location.go'
      - 'openstack/config/provider_client.go'
      - 'openstack/utils/choose_version.go'
      - 'openstack/utils/discovery.go'
      - '**objectstorage**'
      - '.github/workflows/functional-objectstorage.yaml'
  schedule:
    - cron: '0 0 */3 * *'
jobs:
  functional-objectstorage:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "master"
            openstack_version: "master"
            ubuntu_version: "24.04"
          - name: "gazpacho"
            openstack_version: "stable/2026.1"
            ubuntu_version: "24.04"
          - name: "epoxy"
            openstack_version: "stable/2025.1"
            ubuntu_version: "24.04"
    runs-on: ubuntu-${{ matrix.ubuntu_version }}
    name: Swift on OpenStack ${{ matrix.name }}
    steps:
      - name: Checkout Gophercloud
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Deploy devstack
        uses: gophercloud/devstack-action@60ca1042045c0c9e3e001c64575d381654ffcba1 # v0.19
        with:
          branch: ${{ matrix.openstack_version }}
          conf_overrides: |
            SWIFT_ENABLE_TEMPURLS=True
            SWIFT_TEMPURL_KEY=secretkey
            [[post-config|\$SWIFT_CONFIG_PROXY_SERVER]]
            [filter:versioned_writes]
            allow_object_versioning = true
          enabled_services: 's-account,s-container,s-object,s-proxy,openstack-cli-server'
      - name: Checkout go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run Gophercloud acceptance tests
        run: |
          source ${{ github.workspace }}/script/stackenv
          make acceptance-objectstorage
        env:
          DEVSTACK_PATH: ${{ github.workspace }}/devstack
          OS_BRANCH: ${{ matrix.openstack_version }}
      - name: Generate logs on failure
        run: ./script/collectlogs
        if: failure()
      - name: Upload logs artifacts on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: functional-objectstorage-${{ matrix.name }}-${{ github.run_id }}
          path: /tmp/devstack-logs/*
