name: Unit Testing
on:
  - merge_group
  - push
  - pull_request
permissions:
  contents: read
jobs:
  test:
    permissions:
      checks: write  # for coverallsapp/github-action to create a new check based on the results
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout Gophercloud
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Setup environment
        run: |
          # Changing into a different directory to avoid polluting go.sum with "go get"
          cd "$(mktemp -d)"
          go mod init unit_tests
          go install github.com/alexfalkowski/gocovmerge@v1.4.0
      - name: Run unit tests
        run: |
          make unit
          make coverage
      - name: Check coverage
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          file: cover.out
          parallel: true
  finish:
    permissions:
      checks: write  # for coverallsapp/github-action to create a new check based on the results
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Store coverage results
      uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
      with:
        parallel-finished: true
