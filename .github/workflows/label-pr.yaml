name: Label PR
on:
  # Safe: the edits job does not checkout or execute any PR code.
  # It only runs the pinned actions/labeler action which reads event
  # metadata and the base branch .github/labeler.yml configuration.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types:
      - opened
      - synchronize
      - reopened
  # Safe: the semver-label job never checks out or executes PR code.
  # It only reads a data artifact produced by the unprivileged
  # "Semver analysis" workflow and uses the GitHub API to apply labels.
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: ["Semver analysis"]
    types:
      - completed

permissions: {}

jobs:
  semver-label:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
      pull-requests: write
    steps:
    - name: Download semver results
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: semver-results
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Read semver results
      id: semver
      run: |
        echo "type=$(cat semver-type)" >> "$GITHUB_OUTPUT"
        echo "pr-number=$(cat pr-number)" >> "$GITHUB_OUTPUT"
        echo "base-ref=$(cat base-ref)" >> "$GITHUB_OUTPUT"

    - name: Report failure
      if: github.event.workflow_run.conclusion == 'failure'
      run: |
        gh pr edit "$NUMBER" --remove-label "semver:major,semver:minor,semver:patch,backport-v2,backport-v1"
        gh issue comment "$NUMBER" --body "$BODY"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        NUMBER: ${{ steps.semver.outputs.pr-number }}
        BODY: >
          Failed to assess the semver bump. See [logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}) for details.

    - name: Add label semver:patch
      if: github.event.workflow_run.conclusion == 'success' && steps.semver.outputs.type == 'patch'
      run: |
        LABELS="semver:patch"
        REMOVE_LABELS="semver:major,semver:minor"

        # Only add backport-v2 if not already targeting v2 or lower
        if [[ "$BASE_REF" != "v2" && "$BASE_REF" != "v1" ]]; then
          LABELS="$LABELS,backport-v2"
        else
          REMOVE_LABELS="$REMOVE_LABELS,backport-v2"
        fi

        gh pr edit "$NUMBER" --add-label "$LABELS" --remove-label "$REMOVE_LABELS"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        NUMBER: ${{ steps.semver.outputs.pr-number }}
        BASE_REF: ${{ steps.semver.outputs.base-ref }}

    - name: Add label semver:minor
      if: github.event.workflow_run.conclusion == 'success' && steps.semver.outputs.type == 'minor'
      run: |
        LABELS="semver:minor"
        REMOVE_LABELS="semver:major,semver:patch"

        # Only add backport-v2 if not already targeting v2 or lower
        if [[ "$BASE_REF" != "v2" && "$BASE_REF" != "v1" ]]; then
          LABELS="$LABELS,backport-v2"
          REMOVE_LABELS="$REMOVE_LABELS,backport-v1"
        else
          REMOVE_LABELS="$REMOVE_LABELS,backport-v2,backport-v1"
        fi

        gh pr edit "$NUMBER" --add-label "$LABELS" --remove-label "$REMOVE_LABELS"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        NUMBER: ${{ steps.semver.outputs.pr-number }}
        BASE_REF: ${{ steps.semver.outputs.base-ref }}

    - name: Add label semver:major
      if: github.event.workflow_run.conclusion == 'success' && steps.semver.outputs.type == 'major'
      run: gh pr edit "$NUMBER" --add-label "semver:major" --remove-label "semver:minor,semver:patch,backport-v2,backport-v1"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        NUMBER: ${{ steps.semver.outputs.pr-number }}

  edits:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6
