name: functional-loadbalancer
on:
  pull_request:
    paths:
      - 'openstack/auth_env.go'
      - 'openstack/client.go'
      - 'openstack/endpoint.go'
      - 'openstack/endpoint_location.go'
      - 'openstack/config/provider_client.go'
      - 'openstack/utils/choose_version.go'
      - 'openstack/utils/discovery.go'
      - '**loadbalancer**'
      - '.github/workflows/functional-loadbalancer.yaml'
  schedule:
    - cron: '0 0 */3 * *'
jobs:
  functional-loadbalancer:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "master"
            openstack_version: "master"
            ubuntu_version: "24.04"
            devstack_conf_overrides: |
              LIBVIRT_CPU_MODE=host-passthrough
              OCTAVIA_AMP_DISTRIBUTION_RELEASE_ID=jammy
          - name: "gazpacho"
            openstack_version: "stable/2026.1"
            ubuntu_version: "24.04"
            devstack_conf_overrides: |
              LIBVIRT_CPU_MODE=host-passthrough
              OCTAVIA_AMP_DISTRIBUTION_RELEASE_ID=jammy
          - name: "epoxy"
            openstack_version: "stable/2025.1"
            ubuntu_version: "24.04"
            devstack_conf_overrides: |
              LIBVIRT_CPU_MODE=host-passthrough
              OCTAVIA_AMP_DISTRIBUTION_RELEASE_ID=jammy
    runs-on: ubuntu-${{ matrix.ubuntu_version }}
    name: Octavia on OpenStack ${{ matrix.name }}
    steps:
      - name: Checkout Gophercloud
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Deploy devstack
        uses: gophercloud/devstack-action@60ca1042045c0c9e3e001c64575d381654ffcba1 # v0.19
        with:
          branch: ${{ matrix.openstack_version }}
          conf_overrides: |
            enable_plugin octavia https://github.com/openstack/octavia ${{ matrix.openstack_version }}
            enable_plugin neutron https://github.com/openstack/neutron ${{ matrix.openstack_version }}

            ${{ matrix.devstack_conf_overrides }}
          enabled_services: "octavia,o-api,o-cw,o-hk,o-hm,o-da,neutron-qos,openstack-cli-server"
      - name: Checkout go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run Gophercloud acceptance tests
        run: |
          source ${{ github.workspace }}/script/stackenv
          make acceptance-loadbalancer
        env:
          DEVSTACK_PATH: ${{ github.workspace }}/devstack
          OS_BRANCH: ${{ matrix.openstack_version }}
      - name: Generate logs on failure
        run: ./script/collectlogs
        if: failure()
      - name: Upload logs artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: functional-loadbalancer-${{ matrix.name }}-${{ github.run_id }}
          path: /tmp/devstack-logs/*
